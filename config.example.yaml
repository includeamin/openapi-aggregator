# Example configuration for openapi-aggregator
#
# Sources can be local files (YAML or JSON) or HTTP endpoints.
# The aggregator auto-detects the format from content.

sources:
  # Local file sources
  - name: petstore
    path: ./specs/petstore.yaml
    # tag_prefix: "MyPets"  # optional: override the prefix for this source's tags
    # additional_blocks:      # optional: deep-merged into this source spec
    #   x-custom-root:
    #     enabled: true
    #   paths:
    #     /pets:
    #       get:
    #         x-custom-operation:
    #           rate_limit: 100

  - name: users
    path: ./specs/users.json

  # HTTP source with custom headers
  - name: billing
    url: https://billing.example.com/openapi.json
    headers:
      Authorization: "Bearer your-token-here"
      Accept: "application/json"
    # additional_blocks:
    #   x-another-extension:
    #     key: value

# Output settings (used by the CLI)
output:
  format: yaml  # yaml | json

# Merge behaviour
merge:
  # How to handle duplicate paths or component names
  #   error     – fail immediately (default)
  #   overwrite – last source wins
  #   rename    – prefix conflicting names with the source name
  conflict_strategy: error

  # Prefix every path with /{source_name} to guarantee uniqueness
  prefix_paths: false

  # How to prefix tags from each source
  #   none        – keep original tag names, deduplicate (default)
  #   source_name – prefix each tag with the source name (or custom tag_prefix)
  tag_prefix: none

  # Separator between prefix and tag name (default: "/")
  # tag_separator: "/"

  # Override fields in the merged info object
  info:
    title: "My Aggregated API"
    version: "1.0.0"
    description: "Combined specification from multiple services"

  # Explicit servers for the merged spec (replaces any servers from sources)
  # servers:
  #   - url: https://api.example.com
  #     description: Production
  #   - url: https://staging.example.com
  #     description: Staging

  # Explicit tags for the merged spec (replaces any tags from sources)
  # tags:
  #   - name: pets
  #     description: Pet operations
  #   - name: users
  #     description: User operations
